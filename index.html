<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Palestra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e6e0;
    --muted: #6b6860;
    --muted2: #4a4846;
    --accent-a: #b39dff;
    --accent-a-bg: #1a0f30;
    --accent-a-border: #3d2a6b;
    --accent-b: #ff7c6e;
    --accent-b-bg: #2a0f0f;
    --accent-b-border: #6b2a2a;
    --green: #6ee7b7;
    --green-bg: #0a1a0f;
    --green-border: #1a3a1f;
    --amber: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 28px 16px 80px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header-left .label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    text-align: right;
  }

  .stat { }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--amber);
    display: block;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .tab.active-a {
    background: var(--accent-a-bg);
    border-color: var(--accent-a-border);
    color: var(--accent-a);
  }

  .tab.active-b {
    background: var(--accent-b-bg);
    border-color: var(--accent-b-border);
    color: var(--accent-b);
  }

  .tab:hover:not(.active-a):not(.active-b) {
    border-color: var(--border2);
    color: var(--text);
  }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Exercise block */
  .ex-block {
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .ex-block.is-key { border-color: var(--green-border); }

  .ex-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 14px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }

  .ex-block.is-key .ex-header { background: var(--green-bg); }

  .ex-header:hover { background: var(--surface2); }
  .ex-block.is-key .ex-header:hover { background: #0d2015; }

  .ex-name-row { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

  .ex-title {
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .key-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .ex-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .ex-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .ex-best {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    white-space: nowrap;
  }

  .ex-best:empty::before { content: '—'; color: var(--muted2); }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .ex-block.open .chevron { transform: rotate(180deg); }

  /* Log area */
  .ex-body {
    display: none;
    padding: 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .ex-block.open .ex-body { display: block; }

  /* Log form */
  .log-form {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .log-form input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .log-form input:focus { border-color: var(--border2); }
  .log-form input::placeholder { color: var(--muted2); }

  .input-kg { width: 90px; }
  .input-note { flex: 1; min-width: 120px; }

  .btn-log {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .btn-log:hover { background: #282828; border-color: #444; }

  /* History */
  .history { display: flex; flex-direction: column; gap: 3px; }

  .history-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 6px 10px;
    background: var(--surface);
    border-radius: 5px;
    font-size: 12px;
  }

  .h-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .h-weight {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--text);
  }

  .h-weight .unit { font-size: 10px; color: var(--muted); }

<!-- PANEL PROGRESSI -->
<div class="panel" id="panel-progress">
  <div class="section-title">Giorno A</div>
  <div class="progress-header">
    <span>esercizio</span>
    <span>inizio</span>
    <span>massimo</span>
    <span>Δ</span>
  </div>
  <div class="progress-grid" id="progress-a"></div>

  <div class="section-title" style="margin-top:8px">Giorno B</div>
  <div class="progress-header">
    <span>esercizio</span>
    <span>inizio</span>
    <span>massimo</span>
    <span>Δ</span>
  </div>
  <div class="progress-grid" id="progress-b"></div>

  <button class="btn-clear" onclick="clearAll()">Cancella tutti i dati</button>
</div>

<script>
const EXERCISES_A = ['lat-machine','lento-avanti','squat','panca-piana','hip-thrust','french-press'];
const EXERCISES_B = ['pulley-basso','alzate-laterali','face-pull','affondi','leg-curl','bilanciere-scott','push-down'];
const ALL_EXERCISES = [...EXERCISES_A, ...EXERCISES_B];

const NAMES = {
  'lat-machine': 'Lat machine',
  'lento-avanti': 'Lento avanti',
  'squat': 'Squat',
  'panca-piana': 'Panca piana',
  'hip-thrust': 'Hip thrust',
  'french-press': 'French press',
  'pulley-basso': 'Pulley basso',
  'alzate-laterali': 'Alzate laterali',
  'face-pull': 'Face pull',
  'affondi': 'Affondi',
  'leg-curl': 'Leg curl',
  'bilanciere-scott': 'Bilanciere Scott',
  'push-down': 'Push down'
};

function getKey(id) { return 'tracker_' + id; }

function getData(id) {
  try { return JSON.parse(localStorage.getItem(getKey(id))) || []; }
  catch { return []; }
}

function saveData(id, arr) {
  localStorage.setItem(getKey(id), JSON.stringify(arr));
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function toggleBlock(id) {
  const block = document.getElementById('block-' + id);
  block.classList.toggle('open');
}

function logWeight(id) {
  const kgInput = document.getElementById('kg-' + id);
  const noteInput = document.getElementById('note-' + id);
  const kg = parseFloat(kgInput.value);
  if (isNaN(kg) || kg <= 0) { kgInput.focus(); return; }
  const entry = { date: new Date().toISOString(), kg, note: noteInput.value.trim() };
  const data = getData(id);
  data.unshift(entry);
  saveData(id, data);
  kgInput.value = '';
  noteInput.value = '';
  renderHistory(id);
  renderBest(id);
  updateStats();
}

function deleteEntry(id, index) {
  const data = getData(id);
  data.splice(index, 1);
  saveData(id, data);
  renderHistory(id);
  renderBest(id);
  updateStats();
}

function renderHistory(id) {
  const data = getData(id);
  const container = document.getElementById('history-' + id);
  if (!container) return;
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-history">nessun dato ancora</div>';
    return;
  }
  container.innerHTML = data.map((entry, i) => {
    const prev = data[i + 1];
    let trend = '';
    if (prev) {
      if (entry.kg > prev.kg) trend = '<span class="h-trend trend-up">▲</span>';
      else if (entry.kg < prev.kg) trend = '<span class="h-trend trend-down">▼</span>';
      else trend = '<span class="h-trend trend-eq">—</span>';
    }
    return `<div class="history-row">
      <span class="h-date">${formatDate(entry.date)}</span>
      <span class="h-weight">${entry.kg}<span class="unit"> kg</span>${trend}</span>
      <span class="h-note">${entry.note || ''}</span>
      <button class="h-delete" onclick="deleteEntry('${id}', ${i})" title="elimina">✕</button>
    </div>`;
  }).join('');
}

function renderBest(id) {
  const data = getData(id);
  const el = document.getElementById('best-' + id);
  if (!el) return;
  if (data.length === 0) { el.textContent = ''; return; }
  const best = Math.max(...data.map(d => d.kg));
  el.textContent = best + ' kg';
}

function updateStats() {
  let totalEntries = 0;
  const sessionDates = new Set();
  ALL_EXERCISES.forEach(id => {
    const data = getData(id);
    totalEntries += data.length;
    data.forEach(e => sessionDates.add(e.date.split('T')[0]));
  });
  document.getElementById('total-entries').textContent = totalEntries;
  document.getElementById('total-sessions').textContent = sessionDates.size;
}

function renderProgress() {
  ['a', 'b'].forEach(day => {
    const exercises = day === 'a' ? EXERCISES_A : EXERCISES_B;
    const container = document.getElementById('progress-' + day);
    const rows = exercises.map(id => {
      const data = getData(id);
      if (data.length === 0) return `<div class="progress-row">
        <span class="pr-name">${NAMES[id]}</span>
        <span class="pr-first" style="color:var(--muted2)">—</span>
        <span class="pr-best" style="color:var(--muted2)">—</span>
        <span class="pr-delta zero">—</span>
      </div>`;
      const first = data[data.length - 1].kg;
      const best = Math.max(...data.map(d => d.kg));
      const delta = best - first;
      const deltaStr = delta > 0 ? '+' + delta : delta === 0 ? '=' : String(delta);
      const deltaClass = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'zero';
      return `<div class="progress-row">
        <span class="pr-name">${NAMES[id]}</span>
        <span class="pr-first">${first} kg</span>
        <span class="pr-best">${best} kg</span>
        <span class="pr-delta ${deltaClass}">${deltaStr} kg</span>
      </div>`;
    });
    container.innerHTML = rows.join('');
  });
}

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active-a', 'active-b', 'active-progress');
  });
  if (tab === 'a') {
    document.getElementById('panel-a').classList.add('active');
    document.querySelectorAll('.tab')[0].classList.add('active-a');
  } else if (tab === 'b') {
    document.getElementById('panel-b').classList.add('active');
    document.querySelectorAll('.tab')[1].classList.add('active-b');
  } else {
    document.getElementById('panel-progress').classList.add('active');
    document.querySelectorAll('.tab')[2].style.background = 'var(--surface2)';
    document.querySelectorAll('.tab')[2].style.borderColor = 'var(--border2)';
    document.querySelectorAll('.tab')[2].style.color = 'var(--text)';
    renderProgress();
  }
}

function clearAll() {
  if (!confirm('Cancellare tutti i dati salvati?')) return;
  ALL_EXERCISES.forEach(id => localStorage.removeItem(getKey(id)));
  ALL_EXERCISES.forEach(id => { renderHistory(id); renderBest(id); });
  updateStats();
}

// Init
ALL_EXERCISES.forEach(id => { renderHistory(id); renderBest(id); });
updateStats();
</script>
